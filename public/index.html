<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>Vortex | RD</title>

    <script src="/scram/scramjet.all.js"></script>
    <script>
        window.$scramjetFlagsOverride = {
            "serviceworkers": true,
            "syncxhr": true,
            "strictRewrites": false,
            "captureErrors": true,
            "cleanErrors": true,
            "rewriterLogs": false,
            "allowInvalidJs": true,
            "allowFailedIntercepts": true,
            "sslVerify": false
        };
    </script>
    <script src="/baremux/index.js"></script>
    
    <link rel="stylesheet" href="index.css" />
    <script src="search.js"></script>
    <script src="register-sw.js" defer></script>
    <script src="index.js" defer></script>
</head>

<body>
    <div id="browser-wrapper">
        <header id="navbar">
            <div class="nav-left-group">
                <div class="logo-section">
                    <button id="custombutton" onclick="goHome();">
                        <h1>Vortex</h1>
                    </button>
                </div>

                <div class="nav-buttons">
                    <button id="back-btn" onclick="goBack()">←</button>
                    <button id="forward-btn" onclick="goForward()">→</button>
                    <button id="refresh-btn" onclick="refresh()">↻</button>
                </div>
            </div>

            <form id="sj-form">
                <input id="sj-search-engine" value="https://www.google.com/search?q=%s" type="hidden" />
                <div class="input-group">
                    <input id="sj-address" type="text" placeholder="Search the web freely" autocomplete="off" />
                    <button type="submit">Go</button>
                </div>
            </form>

            <button id="apps-btn" onclick="toggleApps()">Apps</button>
        </header>

        <div id="apps-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="toggleApps()">&times;</span>
                <h2>Quick Apps</h2>
                <div class="apps-grid">
                    <div class="app-card" onclick="openApp('https://discord.com')">
                        <img src="assets/img/discord.png" alt="Discord">
                        <span>Discord</span>
                    </div>
                    <div class="app-card" onclick="openApp('https://google.com')">
                        <img src="assets/img/google.svg" alt="Google">
                        <span>Google</span>
                    </div>
                    <div class="app-card" onclick="openApp('https://duckduckgo.com')">
                        <img src="assets/img/ddg.svg" alt="DuckDuckGo">
                        <span>DuckDuckGo</span>
                    </div>
                    <div class="app-card" onclick="openApp('https://instagram.com')">
                        <img src="assets/img/instagram.png" alt="Instagram">
                        <span>Instagram</span>
                    </div>
                    <div class="app-card" onclick="openApp('https://chatgpt.com')">
                        <img src="assets/img/chatgpt.svg" alt="ChatGPT">
                        <span>ChatGPT</span>
                    </div>
                    <div class="app-card more-soon-card">
                        <div class="plus-icon">+</div>
                        <span>More Soon</span>
                    </div>
                </div>
            </div>
        </div>

        <main id="frame-container">
            <div id="landing-state">
                <div class="welcome-content">
                    <h2>Welcome to Vortex</h2>
                    <p>Enter a URL or search term in the bar above to begin browsing.</p>
                </div>
            </div>
        </main>

        <div id="error-display">
            <p id="sj-error"></p>
            <pre id="sj-error-code"></pre>
        </div>
    </div>
</body>
</html>
